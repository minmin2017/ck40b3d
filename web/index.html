<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK40B-3D Lathe Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f131a;
            --bg-panel: rgba(22, 28, 38, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-green: #00E676;
            --accent-blue: #00CCFF;
            --accent-red: #FF3366;
            --text-main: #f0f3f8;
            --text-muted: #8a99ad;
            --font-outfit: 'Outfit', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-outfit);
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 3D Scene Viewport */
        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
        }

        /* Header / HUD Panel (Top-Left) */
        #hud-panel {
            top: 20px;
            left: 20px;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #hud-panel h1 {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .hud-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .hud-line .label {
            color: var(--text-muted);
        }

        .hud-line .val {
            font-weight: 600;
        }

        /* DRO Display (Digital Read Out) */
        .dro-container {
            margin-top: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .dro-axis {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }

        .dro-axis .axis-lbl {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 2px;
        }

        .dro-axis .axis-val {
            font-family: var(--font-mono);
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-green);
        }

        /* Sidebar / Tools & Collisions (Right) */
        #sidebar {
            top: 20px;
            right: 20px;
            bottom: 120px;
            width: 320px;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-section {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .sidebar-section:last-child {
            margin-bottom: 0;
        }

        .sidebar-section h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Tool List */
        .tool-list {
            overflow-y: auto;
            max-height: 180px;
            padding-right: 5px;
        }

        .tool-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .tool-item.active {
            background: rgba(0, 204, 255, 0.1);
            border-color: var(--accent-blue);
        }

        .tool-item.candidate {
            border-style: dashed;
            border-color: var(--accent-green);
        }

        .tool-color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .tool-name {
            font-size: 12px;
            font-weight: 600;
            flex: 1;
        }

        .tool-type {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Collision Log */
        .collision-log {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .collision-item {
            background: rgba(255, 51, 102, 0.08);
            border: 1px solid rgba(255, 51, 102, 0.2);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .collision-item:hover {
            background: rgba(255, 51, 102, 0.15);
            border-color: var(--accent-red);
        }

        .collision-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--accent-red);
            margin-bottom: 4px;
        }

        /* Playback & Camera Bar (Bottom) */
        #control-bar {
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 24px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            gap: 20px;
        }

        /* Left Side Controls (Play/Pause, Timeline) */
        .timeline-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-outfit);
            font-weight: 600;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-active {
            background: var(--accent-blue);
            color: var(--bg-dark);
            border-color: var(--accent-blue);
        }

        .btn-active:hover {
            background: #00b3db;
            border-color: #00b3db;
        }

        .btn-green-active {
            background: var(--accent-green);
            color: var(--bg-dark);
            border-color: var(--accent-green);
        }

        .scrubber-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .time-label {
            font-family: var(--font-mono);
            font-size: 13px;
            min-width: 80px;
            text-align: right;
        }

        /* Center Controls (Speed Select) */
        .speed-section {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 8px;
        }

        .speed-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .speed-btn.active {
            background: rgba(255, 255, 255, 0.08);
            color: var(--accent-blue);
        }

        /* Right Side Controls (Camera Preset, Green Zone Toggle) */
        .view-section {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            align-items: center;
        }

        .view-lbl {
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 4px;
        }

        /* Loading Panel */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 204, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loader-text {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- WebGL Canvas Viewport -->
    <div id="viewport"></div>

    <!-- HUD Overlay (Top-Left) -->
    <div id="hud-panel" class="overlay">
        <h1 id="program-name">SAMPLE_PART.NC</h1>
        <div class="hud-line">
            <span class="label">เครื่องจักร / Machine:</span>
            <span class="val" id="machine-name">CK40B-#1</span>
        </div>
        <div class="hud-line">
            <span class="label">ทูลทำงาน / Active Tool:</span>
            <span class="val" id="active-tool-label">T01 (OD Rough)</span>
        </div>
        <div class="hud-line">
            <span class="label">บรรทัด / G-code Line:</span>
            <span class="val" id="gcode-line">N0</span>
        </div>
        
        <div class="dro-container">
            <div class="dro-axis">
                <span class="axis-lbl">X (DIAMETER)</span>
                <span class="axis-val" id="dro-x">0.000</span>
            </div>
            <div class="dro-axis">
                <span class="axis-lbl">Z (POSITION)</span>
                <span class="axis-val" id="dro-z">0.000</span>
            </div>
        </div>
    </div>

    <!-- Sidebar Overlay (Right) -->
    <div id="sidebar" class="overlay">
        <!-- Tools Section -->
        <div class="sidebar-section">
            <h2>รายการเครื่องมือ / Tools</h2>
            <div class="tool-list" id="tool-list-container">
                <!-- Tool items injected by JS -->
            </div>
        </div>
        
        <!-- Collisions Section -->
        <div class="sidebar-section">
            <h2>รายงานการชน / Collisions</h2>
            <div class="collision-log" id="collision-log-container">
                <div style="font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 20px;" id="no-collisions-msg">
                    ไม่มีการชนตรวจพบ
                </div>
            </div>
        </div>
    </div>

    <!-- Control Bar (Bottom) -->
    <div id="control-bar" class="overlay">
        <!-- Playback timeline -->
        <div class="timeline-section">
            <button class="btn btn-active" id="play-btn">PLAY</button>
            <div class="scrubber-container">
                <input type="range" id="timeline-scrubber" min="0" max="100" value="0">
                <span class="time-label" id="timeline-label">0 / 0</span>
            </div>
        </div>

        <!-- Speed Select -->
        <div class="speed-section">
            <button class="speed-btn" data-speed="0.5">0.5X</button>
            <button class="speed-btn active" data-speed="1">1X</button>
            <button class="speed-btn" data-speed="2">2X</button>
            <button class="speed-btn" data-speed="4">4X</button>
        </div>

        <!-- Camera Presets / Toggles -->
        <div class="view-section">
            <button class="btn" id="green-zone-btn" style="margin-right: 15px;">GREEN ZONE</button>
            <span class="view-lbl">มุมกล้อง / Cam:</span>
            <button class="btn" id="cam-preset-iso">3/4 ISO</button>
            <button class="btn" id="cam-preset-front">FRONT</button>
            <button class="btn" id="cam-preset-top">TOP (X-Z)</button>
        </div>
    </div>

    <!-- Spinner Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">กำลังโหลดแบบจำลอง 3D...</div>
    </div>

    <!-- JavaScript Application Entry -->
    <!-- Import map so vendored modules (OrbitControls) can resolve the bare "three" specifier -->
    <script type="importmap">
    {
        "imports": { "three": "./vendor/three.module.js" }
    }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
